name: NSE Auto-Sheet Updater

on:
  schedule:
    # Run Mon–Fri at 6:30 AM IST (1:00 AM UTC) — after NSE bhavcopy is published
    - cron: "0 1 * * 1-5"
    # Run again at 4:00 PM IST (10:30 AM UTC) — end-of-day data
    - cron: "30 10 * * 1-5"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-sheets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run updater ──────────────────────────────────────────────
      - name: Run update_sheet.py
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python update_sheet.py

      # ── 5. Notify on failure ────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Sheet update failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Check the Actions log above for details."
